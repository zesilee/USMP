# USMP E2E 测试 Kustomize 配置
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: usmp-e2e

resources:
  # CRD 定义
  - ../../config/crd/bases
  # RBAC 配置
  - ../../config/rbac
  # 控制器部署
  - ../../config/manager
  # NETCONF 模拟器
  - ./config/netconf-simulator.yaml

images:
  - name: usmp-controller
    newName: usmp-controller
    newTag: e2e-test

commonLabels:
  app: usmp
  environment: e2e-test

patches:
  # 控制器补丁 - 使用本地镜像
  - path: patches/controller-patch.yaml
    target:
      kind: Deployment
      name: usmp-controller
