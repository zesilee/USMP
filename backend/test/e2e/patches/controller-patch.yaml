# E2E 测试专用控制器补丁
apiVersion: apps/v1
kind: Deployment
metadata:
  name: usmp-controller
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: manager
          imagePullPolicy: IfNotPresent
          args:
            - "--zap-log-level=debug"
            - "--zap-stacktrace-level=error"
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
      terminationGracePeriodSeconds: 10
