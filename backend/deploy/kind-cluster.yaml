# Kind 集群配置 - USMP 端到端测试专用
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: usmp-dev

nodes:
  - role: control-plane
    image: kindest/node:v1.31.0
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 8080
        protocol: TCP
      - containerPort: 443
        hostPort: 8443
        protocol: TCP
      # NETCONF 模拟器端口映射
      - containerPort: 30830
        hostPort: 30830
        protocol: TCP

  - role: worker
    image: kindest/node:v1.31.0

featureGates:
  "CustomResourceDefaulting": true

networking:
  disableDefaultCNI: false
  ipFamily: ipv4
