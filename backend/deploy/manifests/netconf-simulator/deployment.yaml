apiVersion: apps/v1
kind: Deployment
metadata:
  name: netconf-simulator
  namespace: usmp-system
  labels:
    app: netconf-simulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: netconf-simulator
  template:
    metadata:
      labels:
        app: netconf-simulator
    spec:
      containers:
      - name: netconf-simulator
        image: golang:1.21-alpine
        command:
        - /bin/sh
        - -c
        - |
          apk add --no-cache git openssh && mkdir -p /app && cd /app && \
          echo 'package main;import ("log";"net";"golang.org/x/crypto/ssh");func main(){log.Println("Starting simple NETCONF simulator on :830");key,_:=ssh.GenerateKey(nil);config:=&ssh.ServerConfig{PasswordCallback:func(c ssh.ConnMetadata,p []byte)(*ssh.Permissions,error){return &ssh.Permissions{},nil}};config.AddHostKey(key);l,_:=net.Listen("tcp",":830");for{c,_:=l.Accept();log.Println("Connection from",c.RemoteAddr())}}' > s.go && \
          go mod init sim && go get golang.org/x/crypto/ssh && go run s.go
        ports:
        - name: netconf
          containerPort: 830
          protocol: TCP
        env:
        - name: SIMULATOR_USERNAME
          value: admin
        - name: SIMULATOR_PASSWORD
          value: Admin@123
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          tcpSocket:
            port: 830
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 830
          initialDelaySeconds: 5
          periodSeconds: 5
