apiVersion: apps/v1
kind: Deployment
metadata:
  name: usmp-frontend
  namespace: usmp-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: usmp-frontend
  template:
    metadata:
      labels:
        app: usmp-frontend
    spec:
      serviceAccountName: usmp-frontend
      containers:
      - name: frontend
        image: usmp-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: usmp-frontend-config
        resources:
          limits:
            cpu: 200m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
        livenessProbe:
          httpGet:
            path: /healthz
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 5
