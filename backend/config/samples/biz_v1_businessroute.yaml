---
apiVersion: biz.usmp.io/v1
kind: BusinessRoute
metadata:
  name: route-default-gateway
  labels:
    app: usmp
    environment: demo
spec:
  deviceID: switch-demo-01
  type: Default
  destinationCIDR: 0.0.0.0/0
  nextHopIP: 192.168.1.1
  preference: 60
  description: 默认网关出口路由
---
apiVersion: biz.usmp.io/v1
kind: BusinessRoute
metadata:
  name: route-internal-vlan100
  labels:
    app: usmp
    environment: demo
spec:
  deviceID: switch-demo-01
  type: Static
  destinationCIDR: 10.0.100.0/24
  nextHopType: Interface
  outInterface: Vlanif100
  preference: 10
  tag: 100
  description: 内部 VLAN100 业务网段
---
apiVersion: biz.usmp.io/v1
kind: BusinessRoute
metadata:
  name: route-blackhole-test
  labels:
    app: usmp
    environment: demo
spec:
  deviceID: switch-demo-01
  type: Blackhole
  destinationCIDR: 192.168.99.0/24
  description: 黑洞路由，丢弃恶意流量
