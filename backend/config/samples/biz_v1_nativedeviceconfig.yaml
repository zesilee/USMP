---
apiVersion: biz.usmp.io/v1
kind: NativeDeviceConfig
metadata:
  name: cli-banner-config
  labels:
    app: usmp
    environment: demo
spec:
  deviceID: switch-demo-01
  format: CLI
  executionMode: Once
  content: |
    sysname
    header shell %
    Welcome to Huawei Switch
    Copyright (c) Huawei Technologies Co., Ltd.
    %
  description: 设置交换机登录 Banner
  saveAfterApply: true
---
apiVersion: biz.usmp.io/v1
kind: NativeDeviceConfig
metadata:
  name: yang-vlan-100-config
  labels:
    app: usmp
    environment: demo
spec:
  deviceID: switch-demo-01
  format: YANG
  executionMode: Persistent
  content: |
    <config>
      <vlan xmlns="urn:huawei:params:xml:ns:yang:huawei-vlan">
        <vlans>
          <vlan>
            <id>100</id>
            <name>Business-VLAN-100</name>
            <description>Business Application VLAN</description>
            <admin-status>up</admin-status>
          </vlan>
        </vlans>
      </vlan>
    </config>
  description: VLAN 100 配置（持续同步模式）
---
apiVersion: biz.usmp.io/v1
kind: NativeDeviceConfig
metadata:
  name: cli-snmp-config
  labels:
    app: usmp
    environment: demo
spec:
  deviceID: switch-demo-01
  format: CLI
  executionMode: Once
  content: |
    snmp-agent
    snmp-agent community read public
    snmp-agent community write private
    snmp-agent sys-info version v2c v3
  description: SNMP 基础配置
  priority: 10
  timeoutSeconds: 30
