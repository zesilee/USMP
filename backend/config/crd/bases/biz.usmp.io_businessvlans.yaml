spec:
    versions:
        - name: v1
          schema:
            openAPIV3Schema:
                properties:
                    apiVersion:
                        description: 'APIVersion defines the versioned schema of this representation of an object. Servers should convert recognized schemas to the latest internal value, and may reject unrecognized values. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources'
                        type: string
                    kind:
                        description: 'Kind is a string value representing the REST resource this object represents. Servers may infer this from the endpoint the client submits requests to. Cannot be updated. In CamelCase. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds'
                        type: string
                    metadata:
                        type: object
                    spec:
                        description: BusinessVlanSpec 定义 BusinessVlan 的期望状态
                        properties:
                            adminStatus:
                                default: Up
                                description: 管理状态
                                enum:
                                    - Up
                                    - Down
                                type: string
                                x-custom-group: 高级设置
                                x-custom-label: 管理状态
                            broadcastDiscardEnabled:
                                description: 广播丢弃开关
                                type: boolean
                            description:
                                description: VLAN 描述
                                maxLength: 255
                                type: string
                                x-custom-group: 基本信息
                                x-custom-label: 描述
                                x-custom-placeholder: 描述该 VLAN 用途
                            deviceID:
                                description: 所属交换机设备 ID
                                type: string
                                x-custom-group: 基本信息
                                x-custom-label: 设备 ID
                                x-custom-placeholder: '例如: 192.168.1.1:830'
                            macLearningEnabled:
                                description: 是否启用 MAC 地址学习
                                type: boolean
                            name:
                                description: VLAN 名称
                                maxLength: 31
                                type: string
                                x-custom-group: 基本信息
                                x-custom-label: VLAN 名称
                                x-custom-placeholder: '例如: VLAN-100'
                            statisticEnabled:
                                description: 统计收集开关
                                type: boolean
                            taggedPorts:
                                description: Tagged 端口列表
                                items:
                                    type: string
                                type: array
                            type:
                                default: Common
                                description: VLAN 类型
                                enum:
                                    - Common
                                    - Super
                                    - Sub
                                    - Principal
                                    - Separate
                                    - Group
                                type: string
                            untaggedPorts:
                                description: Untagged 端口列表
                                items:
                                    type: string
                                type: array
                            vlanID:
                                description: VLAN ID (1-4094)
                                maximum: 4094
                                minimum: 1
                                type: integer
                                x-custom-group: 基本信息
                                x-custom-label: VLAN ID
                        required:
                            - vlanID
                            - deviceID
                        type: object
                    status:
                        description: BusinessVlanStatus 定义 BusinessVlan 的实际状态
                        properties:
                            actual:
                                description: 设备上实际的 VLAN 状态
                                properties:
                                    description:
                                        type: string
                                    macCount:
                                        type: integer
                                    name:
                                        type: string
                                    operStatus:
                                        type: string
                                    ports:
                                        items:
                                            properties:
                                                active:
                                                    type: boolean
                                                name:
                                                    type: string
                                                tagged:
                                                    type: boolean
                                            type: object
                                        type: array
                                    type:
                                        type: string
                                    vlanID:
                                        type: integer
                                type: object
                            configVersion:
                                description: 配置版本（用于乐观锁）
                                format: int64
                                type: integer
                            diff:
                                description: 期望状态与实际状态的差异
                                items:
                                    type: string
                                type: array
                            lastSyncTime:
                                description: 最后同步时间
                                format: date-time
                                type: string
                                x-custom-label: 最后同步时间
                            message:
                                description: 同步消息
                                type: string
                            phase:
                                default: Pending
                                description: 同步阶段
                                enum:
                                    - Pending
                                    - Syncing
                                    - Synced
                                    - Failed
                                type: string
                                x-custom-label: 同步状态
                        type: object
