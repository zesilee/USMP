spec:
    versions:
        - name: v1
          schema:
            openAPIV3Schema:
                properties:
                    apiVersion:
                        description: 'APIVersion defines the versioned schema of this representation of an object. Servers should convert recognized schemas to the latest internal value, and may reject unrecognized values. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources'
                        type: string
                    kind:
                        description: 'Kind is a string value representing the REST resource this object represents. Servers may infer this from the endpoint the client submits requests to. Cannot be updated. In CamelCase. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds'
                        type: string
                    metadata:
                        type: object
                    spec:
                        description: BusinessInterfaceSpec 定义 BusinessInterface 的期望状态
                        properties:
                            accessVlan:
                                description: Access VLAN（仅 Access 模式有效）
                                maximum: 4094
                                minimum: 1
                                type: integer
                                x-custom-group: VLAN 配置
                                x-custom-label: Access VLAN
                            adminStatus:
                                default: Up
                                description: 管理状态
                                enum:
                                    - Up
                                    - Down
                                type: string
                                x-custom-group: 高级设置
                                x-custom-label: 管理状态
                            description:
                                description: 接口描述
                                type: string
                                x-custom-group: 基本信息
                                x-custom-label: 描述
                                x-custom-placeholder: 描述该 VLAN 用途
                            deviceID:
                                description: 所属交换机设备 ID
                                type: string
                                x-custom-group: 基本信息
                                x-custom-label: 设备 ID
                                x-custom-placeholder: '例如: 192.168.1.1:830'
                            duplex:
                                default: auto
                                description: 双工模式：auto/full/half
                                enum:
                                    - auto
                                    - full
                                    - half
                                type: string
                            interfaceName:
                                description: 接口名称（如 GigabitEthernet0/0/1）
                                type: string
                            ipAddress:
                                description: 三层接口 IP 地址（仅 L3 模式有效）
                                format: ipv4
                                type: string
                            lldpEnabled:
                                default: true
                                description: 是否启用 LLDP
                                type: boolean
                            mode:
                                description: 接口模式
                                enum:
                                    - Access
                                    - Trunk
                                    - Hybrid
                                    - L3
                                    - L2
                                type: string
                                x-custom-group: VLAN 配置
                                x-custom-label: 接口模式
                            mtu:
                                default: 1500
                                description: MTU 值
                                maximum: 9216
                                minimum: 64
                                type: integer
                                x-custom-group: 高级设置
                                x-custom-label: MTU
                            nativeVlan:
                                description: Native VLAN ID（仅 Trunk/Hybrid 模式有效）
                                maximum: 4094
                                minimum: 1
                                type: integer
                            netmask:
                                description: 子网掩码（仅 L3 模式有效）
                                type: string
                            speed:
                                description: 速率配置（Mbps），0 表示自动协商
                                minimum: 0
                                type: integer
                            stormControlEnabled:
                                default: false
                                description: 是否启用风暴控制
                                type: boolean
                            trunkAllowedVlans:
                                description: Trunk 允许通过的 VLAN 列表（仅 Trunk/Hybrid 模式有效）
                                items:
                                    properties:
                                        isNative:
                                            description: 是否是 Native VLAN（仅 Trunk 模式有效）
                                            type: boolean
                                        vlanID:
                                            description: VLAN ID
                                            maximum: 4094
                                            minimum: 1
                                            type: integer
                                    type: object
                                type: array
                        required:
                            - deviceID
                            - interfaceName
                        type: object
                    status:
                        description: BusinessInterfaceStatus 定义 BusinessInterface 的实际状态
                        properties:
                            actualAccessVlan:
                                description: 设备上实际配置的 Access VLAN
                                type: integer
                            actualMTU:
                                description: 实际 MTU
                                type: integer
                            actualNativeVlan:
                                description: 设备上实际配置的 Native VLAN
                                type: integer
                            actualSpeed:
                                description: 实际速率（Mbps）
                                type: integer
                            actualTrunkVlans:
                                description: 设备上实际配置的 Trunk VLAN 列表
                                items:
                                    type: integer
                                type: array
                            counters:
                                description: 统计信息
                                properties:
                                    inDiscards:
                                        description: 入方向丢弃数
                                        type: integer
                                    inErrors:
                                        description: 入方向错误数
                                        type: integer
                                    inOctets:
                                        description: 入方向字节数
                                        type: integer
                                    inPackets:
                                        description: 入方向数据包数
                                        type: integer
                                    outDiscards:
                                        description: 出方向丢弃数
                                        type: integer
                                    outErrors:
                                        description: 出方向错误数
                                        type: integer
                                    outOctets:
                                        description: 出方向字节数
                                        type: integer
                                    outPackets:
                                        description: 出方向数据包数
                                        type: integer
                                type: object
                            errorType:
                                description: 错误类型：Temporary/Permanent
                                enum:
                                    - Temporary
                                    - Permanent
                                type: string
                            interfaceType:
                                description: 接口类型（从设备读取）
                                type: string
                            lastSyncTime:
                                description: 最后同步时间
                                format: date-time
                                type: string
                                x-custom-label: 最后同步时间
                            message:
                                description: 同步消息/错误信息
                                type: string
                            operStatus:
                                description: 运行状态
                                enum:
                                    - Up
                                    - Down
                                    - Testing
                                    - Unknown
                                    - Dormant
                                    - NotPresent
                                type: string
                            phase:
                                default: Pending
                                description: 同步阶段
                                enum:
                                    - Pending
                                    - Syncing
                                    - Synced
                                    - Failed
                                type: string
                                x-custom-label: 同步状态
                            physAddress:
                                description: 物理地址/MAC
                                type: string
                            retryCount:
                                description: 重试次数
                                minimum: 0
                                type: integer
                        type: object
