---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
  name: nativedeviceconfigs.biz.usmp.io
spec:
  group: biz.usmp.io
  names:
    kind: NativeDeviceConfig
    listKind: NativeDeviceConfigList
    plural: nativedeviceconfigs
    singular: nativedeviceconfig
    shortNames:
    - ndc
    - native
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    subresources:
      status: {}
    schema:
      openAPIV3Schema:
        description: NativeDeviceConfig 是原生设备配置的 Schema，用于直接透传 CLI/YANG/XML 配置到设备，不经过翻译引擎
        type: object
        properties:
          apiVersion:
            description: 'APIVersion defines the versioned schema of this representation
              of an object. Servers should convert recognized schemas to the latest
              internal value, and may reject unrecognized values. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources'
            type: string
          kind:
            description: 'Kind is a string value representing the REST resource this
              object represents. Servers may infer this from the endpoint the client
              submits requests to. Cannot be updated. In CamelCase. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds'
            type: string
          metadata:
            type: object
          spec:
            description: NativeDeviceConfigSpec 定义原生配置的期望状态
            type: object
            required:
            - deviceID
            - format
            - content
            properties:
              deviceID:
                description: 所属交换机设备 ID
                type: string
              format:
                description: 配置格式
                type: string
                enum:
                - CLI
                - YANG
                - XML
                - JSON
              content:
                description: 配置内容
                type: string
              executionMode:
                description: 执行模式
                type: string
                enum:
                - Once
                - Persistent
                default: Once
              encrypted:
                description: 配置是否加密
                type: boolean
                default: false
              encryptionAlgorithm:
                description: 加密算法（如 AES-256）
                type: string
              keySecretRef:
                description: 密钥引用（Secret 名称）
                type: string
              description:
                description: 配置描述
                type: string
              priority:
                description: 优先级（用于控制下发顺序，数字越小越先执行）
                type: integer
                default: 50
              group:
                description: 配置分组（用于批量管理）
                type: string
              timeoutSeconds:
                description: 执行超时时间（秒），默认 60 秒
                type: integer
                minimum: 1
                default: 60
              maxRetries:
                description: 失败重试次数，默认 3 次
                type: integer
                minimum: 0
                default: 3
              saveBeforeApply:
                description: 是否在下发前保存配置
                type: boolean
                default: false
              saveAfterApply:
                description: 是否在下发后保存配置
                type: boolean
                default: false
          status:
            description: NativeDeviceConfigStatus 定义原生配置的实际状态
            type: object
            properties:
              phase:
                description: 同步阶段
                type: string
                enum:
                - Pending
                - Syncing
                - Synced
                - Failed
                default: Pending
              lastSyncTime:
                description: 最后同步时间
                type: string
                format: date-time
              message:
                description: 同步消息/错误信息
                type: string
              retryCount:
                description: 重试次数
                type: integer
                minimum: 0
              errorType:
                description: 错误类型：Temporary/Permanent
                type: string
                enum:
                - Temporary
                - Permanent
              executionStatus:
                description: 执行状态
                type: string
                enum:
                - Pending
                - Running
                - Succeeded
                - Failed
                - Skipped
                default: Pending
              configHash:
                description: 配置内容的哈希值（用于检测变化）
                type: string
              deviceResponse:
                description: 设备返回的响应
                type: string
              executionStartTime:
                description: 执行开始时间
                type: string
                format: date-time
              executionEndTime:
                description: 执行结束时间
                type: string
                format: date-time
              executionDurationMs:
                description: 执行耗时（毫秒）
                type: integer
              appliedOnDevice:
                description: 配置已在设备上生效
                type: boolean
