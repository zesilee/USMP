spec:
    versions:
        - name: v1
          schema:
            openAPIV3Schema:
                properties:
                    apiVersion:
                        description: 'APIVersion defines the versioned schema of this representation of an object. Servers should convert recognized schemas to the latest internal value, and may reject unrecognized values. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources'
                        type: string
                    kind:
                        description: 'Kind is a string value representing the REST resource this object represents. Servers may infer this from the endpoint the client submits requests to. Cannot be updated. In CamelCase. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds'
                        type: string
                    metadata:
                        type: object
                    spec:
                        description: BusinessRouteSpec 定义 BusinessRoute 的期望状态
                        properties:
                            advertise:
                                default: true
                                description: 路由是否发布到其他协议
                                type: boolean
                            bfdEnabled:
                                default: false
                                description: 是否启用 BFD 检测
                                type: boolean
                                x-custom-group: 高级设置
                                x-custom-label: 启用 BFD
                            bfdSessionName:
                                description: BFD 会话名称
                                type: string
                            description:
                                description: 描述信息
                                type: string
                                x-custom-group: 基本信息
                                x-custom-label: 描述
                                x-custom-placeholder: 描述该 VLAN 用途
                            destinationCIDR:
                                description: 目标网络（CIDR 格式，如 192.168.1.0/24）
                                format: cidr
                                type: string
                            deviceID:
                                description: 所属交换机设备 ID
                                type: string
                                x-custom-group: 基本信息
                                x-custom-label: 设备 ID
                                x-custom-placeholder: '例如: 192.168.1.1:830'
                            nextHopIP:
                                description: 下一跳 IP 地址（当 NextHopType=IPAddress 时必填）
                                format: ipv4
                                type: string
                            nextHopType:
                                default: IPAddress
                                description: 下一跳类型
                                enum:
                                    - IPAddress
                                    - Interface
                                type: string
                            outInterface:
                                description: 出接口名称（当 NextHopType=Interface 时必填，如 Vlanif10、GigabitEthernet0/0/1）
                                type: string
                            permanent:
                                default: false
                                description: 是否为永久路由（接口 Down 时不删除）
                                type: boolean
                            preference:
                                default: 60
                                description: 路由优先级（值越小优先级越高，1-255，默认 60）
                                maximum: 255
                                minimum: 1
                                type: integer
                                x-custom-group: 高级设置
                                x-custom-label: 优先级
                            tag:
                                description: 路由标签（用于路由策略匹配用）
                                maximum: 4294967295
                                minimum: 0
                                type: integer
                            type:
                                default: Static
                                description: 路由类型
                                enum:
                                    - Static
                                    - Default
                                    - Blackhole
                                type: string
                        required:
                            - deviceID
                            - destinationCIDR
                        type: object
                    status:
                        description: BusinessRouteStatus 定义 BusinessRoute 的实际状态
                        properties:
                            actualPreference:
                                description: 路由的实际优先级
                                type: integer
                            errorType:
                                description: 错误类型：Temporary/Permanent
                                enum:
                                    - Temporary
                                    - Permanent
                                type: string
                            lastSyncTime:
                                description: 最后同步时间
                                format: date-time
                                type: string
                                x-custom-label: 最后同步时间
                            message:
                                description: 同步消息/错误信息
                                type: string
                            nextHopMac:
                                description: 下一跳的 MAC 地址
                                type: string
                            nextHopReachable:
                                description: 下一跳可达性
                                type: boolean
                            outInterfaceStatus:
                                description: 出接口状态（Up/Down）
                                type: string
                            phase:
                                default: Pending
                                description: 同步阶段
                                enum:
                                    - Pending
                                    - Syncing
                                    - Synced
                                    - Failed
                                type: string
                                x-custom-label: 同步状态
                            retryCount:
                                description: 重试次数
                                minimum: 0
                                type: integer
                            routeStatus:
                                description: 路由实际状态
                                enum:
                                    - Active
                                    - Inactive
                                    - Failed
                                type: string
                        type: object
