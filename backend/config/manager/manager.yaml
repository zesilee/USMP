apiVersion: v1
kind: Namespace
metadata:
  name: usmp-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: usmp-controller
  namespace: usmp-system
  labels:
    control-plane: controller
spec:
  selector:
    matchLabels:
      control-plane: controller
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller
    spec:
      securityContext:
        runAsNonRoot: true
      serviceAccountName: usmp-controller
      terminationGracePeriodSeconds: 10
      containers:
      - command:
        - /manager
        args:
        - --leader-elect
        image: usmp/controller:latest
        name: manager
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - "ALL"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
      nodeSelector:
        kubernetes.io/os: linux
