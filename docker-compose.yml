# USMP 端到端本地 staging 编排
#
# 用途：Mac 自托管 Runner 在 merge→main 后 `docker compose up -d` 把整套系统跑起来，
#       跑完 Playwright 全栈 E2E 后保持常驻，成为随时可访问的本地 staging。
#   前端：http://localhost:3002    后端 API：http://localhost:8080/api/v1
#
# 关键接线：backend 硬编码默认设备 192.168.1.1:830 admin/admin（不可经 env 配置），
#   且 E2E 断言该设备返回 ≥4 VLAN。故给 simulator 在自定义 bridge 上固定 IP 192.168.1.1，
#   backend 同网即可用种子设备直连模拟器 —— 无需改任何后端代码或 E2E 断言。
#   （Docker Desktop for Mac 的 bridge 运行在其 LinuxKit VM 内，与宿主 LAN 隔离，
#    即便家用路由器同为 192.168.1.1 也不冲突。冲突回退见 docs/CICD.md。）

name: usmp-staging

services:
  # NETCONF 模拟网元 —— 固定 IP 192.168.1.1，对齐 backend 种子设备
  simulator:
    build:
      context: ./backend
      dockerfile: Dockerfile.simulator
    image: usmp-simulator:latest
    restart: unless-stopped
    networks:
      usmp-net:
        ipv4_address: 192.168.1.1
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "830"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # 后端控制器 + Gin API（:8080）
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: usmp-controller:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      simulator:
        condition: service_healthy
    networks:
      - usmp-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8080/api/v1/yang/modules"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # 前端静态站（nginx :80 → 宿主 3002）
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: usmp-frontend:latest
    restart: unless-stopped
    ports:
      - "3002:80"
    depends_on:
      - backend
    networks:
      - usmp-net
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:80/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

networks:
  usmp-net:
    driver: bridge
    ipam:
      config:
        # 网关显式设为 .254：默认网关会占用子网首个地址 .1，
        # 而 .1 要留给 simulator（对齐 backend 种子设备），否则 up 会因地址冲突失败。
        - subnet: 192.168.1.0/24
          gateway: 192.168.1.254
