name: Frontend Browser Tests

# 真浏览器组件测试（Vitest Browser Mode + Chromium）。
# 与 frontend-ci 的 happy-dom 单测互补：验证 Element Plus 等组件在真实浏览器里的渲染，
# happy-dom 近似 DOM 测不真的层次（el-table 出行、el-select 展开等）在此覆盖。

on:
  pull_request:
    paths:
      - 'frontend/**'
  push:
    branches: [main]
    paths:
      - 'frontend/**'

permissions:
  contents: read

jobs:
  browser-tests:
    name: Vitest Browser Mode (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Install Chromium
        run: npx playwright install chromium --with-deps

      - name: Browser component tests
        run: npm run test:browser
