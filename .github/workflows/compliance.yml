name: Compliance Check

on:
  push:
    branches: ['*']
    paths: &code-paths
      - 'backend/**'
      - 'scripts/gen-yang.sh'
      - 'yang-models'
      - 'Makefile'
      - '.github/workflows/compliance.yml'
      - '.github/workflows/compliance-skip.yml'
  pull_request:
    branches: [main]
    paths: *code-paths

jobs:
  compliance:
    name: Test + Lint + Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Go Mod Download
        run: go mod download

      - name: Run Tests with Race Detection
        run: |
          go test ./... -race -count=1 -coverprofile=coverage.out -timeout=120s 2>&1 | tee test-output.txt || true
          # Check if any test actually failed (ignore covdata warnings from packages with no tests)
          if grep -qE '^FAIL\s' test-output.txt; then
            echo "::error::Some tests failed"
            exit 1
          fi
          go tool cover -func=coverage.out 2>/dev/null || true

      - name: Check Coverage Baseline
        run: |
          CURRENT=$(go tool cover -func=coverage.out 2>/dev/null | grep total | awk '{print $3}' | sed 's/%//' || echo "0")
          echo "Current coverage: ${CURRENT}%"
          if [ -f .coverage-baseline ]; then
            BASELINE=$(cat .coverage-baseline)
            echo "Baseline coverage: ${BASELINE}%"
            if [ "$BASELINE" != "0" ] && [ "$CURRENT" != "0" ]; then
              if (( $(echo "$CURRENT < $BASELINE" | bc -l 2>/dev/null || echo "0") )); then
                echo "::error::Coverage dropped from ${BASELINE}% to ${CURRENT}% — coverage must not decrease"
                exit 1
              fi
            fi
          else
            echo "No baseline file, recording current coverage"
            echo "$CURRENT" > .coverage-baseline
          fi

      - name: Go Vet
        run: go vet ./...

      - name: Go Fmt Check
        run: |
          # Only check files changed in this PR (not entire codebase)
          CHANGED=$(git diff --name-only --diff-filter=ACMR origin/main...HEAD 2>/dev/null | grep '\.go$' || true)
          if [ -n "$CHANGED" ]; then
            UNFORMATTED=$(gofmt -l $CHANGED 2>/dev/null || true)
            if [ -n "$UNFORMATTED" ]; then
              echo "::error::Unformatted files:"
              echo "$UNFORMATTED"
              exit 1
            fi
          fi
          echo "Go fmt check passed"

      - name: Check Generated Code Reproducible (R04 regen-and-diff)
        working-directory: .
        run: |
          # 生成物改动合法当且仅当可由管线复现：触及生成物/管线/模型指针时
          # 重跑 make gen-yang 并断言零漂移（取代旧的无条件冻结 generated/）
          git fetch --depth=1 origin main 2>/dev/null || true
          CHANGED=$(git diff --name-only origin/main HEAD 2>/dev/null | grep -E '^(backend/internal/generated/|backend/tools/genfix/|scripts/gen-yang\.sh|yang-models)' || true)
          if [ -z "$CHANGED" ]; then
            echo "No generated-pipeline related changes, skipping regen check"
            exit 0
          fi
          echo "Regen-relevant changes detected:"
          echo "$CHANGED"
          git submodule update --init --depth 1 yang-models
          make gen-yang
          if ! git diff --exit-code backend/internal/generated/; then
            echo "::error::[R04] Generated code drift: backend/internal/generated/ 与 make gen-yang 输出不一致（生成物勿手改，改 YANG/gen.conf 后重跑 make gen-yang 提交）"
            exit 1
          fi
          echo "Generated code is reproducible"
