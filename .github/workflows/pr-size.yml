name: PR Size Check

on:
  pull_request:
    branches: [main]

jobs:
  pr-size:
    name: Check PR Size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR Size
        run: |
          # 体积只算「手写代码」，排除生成物/锁文件（lockfile、*.gen.ts、go.sum、openapi 中间产物、
          # ygot 生成物目录——该目录由 compliance 的 R04 regen-and-diff 门禁守护，手写内容仅 gen.conf/文档）
          EXCLUDE=(':(exclude)**/package-lock.json' ':(exclude)**/*.gen.ts' ':(exclude)**/go.sum' ':(exclude)backend/docs/openapi/**' ':(exclude)backend/internal/generated/**')
          STATS=$(git diff origin/main...HEAD --stat -- . "${EXCLUDE[@]}" | tail -1)
          INSERTIONS=$(echo "$STATS" | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo "0")
          DELETIONS=$(echo "$STATS" | grep -oE '[0-9]+ deletion' | grep -oE '[0-9]+' || echo "0")
          TOTAL=$((INSERTIONS + DELETIONS))

          echo "PR size: ${TOTAL} lines (+${INSERTIONS} -${DELETIONS})"

          # Limits:
          #   Feature PR (≤20 files): 1000 lines
          #   Infrastructure PR (>20 files): 3000 lines
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD | wc -l | tr -d ' ')
          if [ "$CHANGED_FILES" -gt 20 ]; then
            LIMIT=3000
            echo "Infrastructure PR detected (${CHANGED_FILES} files), limit: ${LIMIT}"
          else
            LIMIT=1000
          fi

          if [ "$TOTAL" -gt "$LIMIT" ]; then
            echo "::error::[TM04] PR size ${TOTAL} lines exceeds ${LIMIT} line limit. Split into smaller PRs."
            exit 1
          fi

          echo "PR size is within limits (${LIMIT})"
