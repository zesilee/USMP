name: PR Size Check

on:
  pull_request:
    branches: [main]

jobs:
  pr-size:
    name: Check PR Size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR Size
        run: |
          STATS=$(git diff origin/main...HEAD --stat | tail -1)
          INSERTIONS=$(echo "$STATS" | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo "0")
          DELETIONS=$(echo "$STATS" | grep -oE '[0-9]+ deletion' | grep -oE '[0-9]+' || echo "0")
          TOTAL=$((INSERTIONS + DELETIONS))

          echo "PR size: ${TOTAL} lines (+${INSERTIONS} -${DELETIONS})"

          # Regular limit: 800 lines
          # Infrastructure/docs limit: 5000 lines (labeled PRs)
          LIMIT=800
          PR_LABELS=$(gh pr view ${{ github.event.pull_request.number }} --json labels -q '.labels[].name' 2>/dev/null || echo "")
          if echo "$PR_LABELS" | grep -qE 'infra|documentation'; then
            LIMIT=5000
            echo "Infrastructure/docs PR detected, limit raised to ${LIMIT}"
          fi

          if [ "$TOTAL" -gt "$LIMIT" ]; then
            echo "::error::[TM04] PR size ${TOTAL} lines exceeds ${LIMIT} line limit. Split into smaller PRs."
            exit 1
          fi

          echo "PR size is within limits (${LIMIT})"
