name: PR Size Check

on:
  pull_request:
    branches: [main]

jobs:
  pr-size:
    name: Check PR Size (≤800 lines)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR Size
        run: |
          STATS=$(git diff origin/main...HEAD --stat | tail -1)
          INSERTIONS=$(echo "$STATS" | grep -oE '[0-9]+ insertion' | grep -oE '[0-9]+' || echo "0")
          DELETIONS=$(echo "$STATS" | grep -oE '[0-9]+ deletion' | grep -oE '[0-9]+' || echo "0")
          TOTAL=$((INSERTIONS + DELETIONS))

          echo "PR size: ${TOTAL} lines (+${INSERTIONS} -${DELETIONS})"

          if [ "$TOTAL" -gt 800 ]; then
            echo "::error::[TM04] PR size ${TOTAL} lines exceeds 800 line limit. Split into smaller PRs."
            exit 1
          fi

          echo "PR size is within limits"
