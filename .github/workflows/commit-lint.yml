name: Commit Message Lint

on:
  pull_request:
    branches: [main]

jobs:
  commit-lint:
    name: Check Commit Messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Lint Commit Messages
        run: |
          # Type prefix: supports optional scope in parentheses, e.g. docs(openspec):
          VALID_TYPES="feat|fix|docs|test|refactor|style|chore|perf"
          FAILED=0

          # Get all commits in this PR
          COMMITS=$(git log origin/main..HEAD --format="%H")

          for COMMIT in $COMMITS; do
            MSG=$(git log -1 --format="%B" "$COMMIT")
            FIRST_LINE=$(echo "$MSG" | head -1)

            # Check type prefix (with optional scope like docs(openspec):)
            if ! echo "$FIRST_LINE" | grep -qE "^(${VALID_TYPES})(\([^)]+\))?: .+$"; then
              echo "::error::Commit ${COMMIT:0:8}: Invalid type prefix: ${FIRST_LINE}"
              FAILED=1
            fi

            # Check What/Why/How (warn but don't fail for legacy commits)
            HAS_WHAT=$(echo "$MSG" | grep -c "^What:" || true)
            HAS_WHY=$(echo "$MSG" | grep -c "^Why:" || true)
            HAS_HOW=$(echo "$MSG" | grep -c "^How:" || true)

            if [ "$HAS_WHAT" -eq 0 ] || [ "$HAS_WHY" -eq 0 ] || [ "$HAS_HOW" -eq 0 ]; then
              echo "::warning::Commit ${COMMIT:0:8}: Missing What/Why/How sections (legacy commit)"
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo "::error::Commit message format check failed"
            exit 1
          fi

          echo "All commit messages are compliant"
