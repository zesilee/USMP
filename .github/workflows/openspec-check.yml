name: OpenSpec Check

on:
  pull_request:
    branches: [main]

jobs:
  openspec-check:
    name: Check OpenSpec Artifacts (D01)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check OpenSpec Change Artifacts
        run: |
          SPEC_DIR="openspec/specs"

          if [ ! -d "$SPEC_DIR" ]; then
            echo "No OpenSpec specs directory, skipping check"
            exit 0
          fi

          # Check if PR touches any spec directory
          CHANGED_FILES=$(git diff origin/main...HEAD --name-only 2>/dev/null || true)
          CHANGED_CHANGES=$(echo "$CHANGED_FILES" | grep "^openspec/specs/" | cut -d'/' -f3 | sort -u || true)

          if [ -z "$CHANGED_CHANGES" ]; then
            echo "No OpenSpec changes in this PR, skipping"
            exit 0
          fi

          FAILED=0
          for CHANGE in $CHANGED_CHANGES; do
            CHANGE_DIR="${SPEC_DIR}/${CHANGE}"

            if [ ! -d "$CHANGE_DIR" ]; then
              continue
            fi

            # D01: Check required artifacts exist
            # spec.md is the behavioral contract (equivalent to proposal)
            REQUIRED_ARTIFACTS="spec.md design.md tasks.md"
            for ARTIFACT in $REQUIRED_ARTIFACTS; do
              if [ ! -f "${CHANGE_DIR}/${ARTIFACT}" ]; then
                echo "::error::[D01] Missing artifact: ${CHANGE_DIR}/${ARTIFACT}"
                FAILED=1
              fi
            done

            # D02: Check tasks.md has completed items
            if [ -f "${CHANGE_DIR}/tasks.md" ]; then
              DONE=$(grep -cE '\[x\]' "${CHANGE_DIR}/tasks.md" 2>/dev/null || echo "0")
              TOTAL=$(grep -cE '\[[ x]\]' "${CHANGE_DIR}/tasks.md" 2>/dev/null || echo "0")
              if [ "$TOTAL" -gt 0 ] && [ "$DONE" -eq 0 ]; then
                echo "::warning::[D02] No tasks completed in ${CHANGE_DIR}/tasks.md"
              fi
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo "::error::OpenSpec artifact check failed"
            exit 1
          fi

          echo "OpenSpec artifacts check passed"
